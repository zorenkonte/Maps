name: Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Build release APKs
        run: ./gradlew :composeApp:assembleRelease

      - name: Read version name
        id: version
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' composeApp/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APKs
        run: |
          V="${{ steps.version.outputs.version }}.${{ github.run_number }}"
          cd composeApp/build/outputs/apk/release
          for f in composeApp-*-release.apk; do
            abi=$(echo "$f" | sed -E 's/composeApp-(.+)-release\.apk/\1/')
            mv "$f" "Pamasahe-$V-$abi.apk"
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          name: Pamasahe v${{ steps.version.outputs.version }}.${{ github.run_number }}
          generate_release_notes: true
          body: |
            Signed release APKs built from `${{ github.sha }}`.

            - **arm64-v8a** — most Android phones (2017+), smallest download
            - **armeabi-v7a** — older 32-bit phones
            - **universal** — all ABIs incl. x86_64 (emulators)

            Self-signed for sideloading; enable "install from unknown sources" to install.
          files: composeApp/build/outputs/apk/release/Pamasahe-*.apk
